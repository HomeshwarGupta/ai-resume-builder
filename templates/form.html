<!DOCTYPE html>
<html>
<head>
    <title>We Don’t Just Generate Resumes — We Generate Futures</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff512f, #dd2476, #1fa2ff);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .container {
            width: 480px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(18px);
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
            color: white;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .tagline {
            text-align: center;
            font-size: 14px;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: white;
            border: none;
            border-radius: 8px;
            color: #dd2476;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ffe3f0;
            transform: scale(1.04);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            opacity: 0.85;
        }

        .logo {
            font-weight: bold;
            font-size: 16px;
            margin-top: 5px;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 AI Resume Builder</h1>
        <div class="tagline">
            We don’t just generate resumes — we generate futures.
        </div>

        <form action="/generate" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="text" name="phone" placeholder="Phone Number" required>

            <input type="text" name="degree" placeholder="Degree" required>
            <input type="text" name="university" placeholder="University" required>
            <input type="text" name="year" placeholder="Passing Year" required>

            <textarea name="skills" placeholder="Skills (comma separated)" required></textarea>
            <textarea name="experience" placeholder="Experience Details" required></textarea>

            <button type="submit">Generate Your Future ✨</button>
        </form>

        <div class="footer">
            Crafted with ❤️
            <div class="logo">By Homeshwar Gupta</div>
        </div>
    </div>

</body>
</html>
